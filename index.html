
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#FDF8F3;--dark:#1A1410;--accent:#C8602A;--accent-light:#F2E8DF;
  --green:#2D7A4F;--green-light:#E8F5EE;--muted:#7A6E66;--border:#E8DDD6;
  --card:#FFFFFF;--radius:14px;--shadow:0 2px 16px rgba(26,20,16,0.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}
h1,h2,h3{font-family:'Playfair Display',serif;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--dark);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{padding:6px 14px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .2s;}
.nav-tab.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.nav-tab:hover:not(.active){background:var(--accent-light);}

/* PANELS */
.panel{display:none;padding:20px;}
.panel.active{display:block;}

/* CATALOGUE GRID */
.cat-header{margin-bottom:20px;}
.cat-header h2{font-size:22px;margin-bottom:4px;}
.cat-header p{font-size:13px;color:var(--muted);}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.prod-card{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,box-shadow .2s;}
.prod-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.prod-img{width:100%;height:160px;object-fit:cover;background:#F0E8E0;display:flex;align-items:center;justify-content:center;font-size:44px;color:var(--muted);}
.prod-img img{width:100%;height:100%;object-fit:cover;}
.prod-info{padding:10px 12px 12px;}
.prod-name{font-size:13px;font-weight:500;margin-bottom:6px;line-height:1.3;}
.badge-promo{display:inline-block;background:#E24B4A;color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;margin-bottom:6px;}
.prod-prices{display:flex;align-items:center;gap:6px;}
.price-old{font-size:11px;color:var(--muted);text-decoration:line-through;}
.price-new{font-size:15px;font-weight:500;color:var(--accent);}
.btn-order{width:100%;margin-top:8px;padding:7px;font-size:12px;font-weight:500;border-radius:8px;border:none;background:var(--dark);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;}
.btn-order:hover{background:var(--accent);}

/* MODAL PRODUIT */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:var(--radius);max-width:420px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-img{width:100%;height:220px;object-fit:cover;background:#F0E8E0;display:flex;align-items:center;justify-content:center;font-size:60px;}
.modal-img img{width:100%;height:220px;object-fit:cover;}
.modal-body{padding:16px 20px 20px;}
.modal-title{font-size:18px;margin-bottom:4px;}
.modal-desc{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.modal-prices{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.modal-price-old{font-size:14px;color:var(--muted);text-decoration:line-through;}
.modal-price-new{font-size:22px;font-weight:500;color:var(--accent);}
.modal-badge{background:#E24B4A;color:#fff;font-size:11px;padding:3px 8px;border-radius:20px;}
.field-group{margin-bottom:10px;}
.field-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
.field-group input,.field-group select,.field-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);outline:none;}
.field-group input:focus,.field-group textarea:focus{border-color:var(--accent);}
.btn-wa{width:100%;padding:12px;border:none;border-radius:10px;background:#25D366;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.btn-wa:hover{background:#1aad54;}
.btn-close{position:absolute;top:12px;right:16px;background:rgba(0,0,0,0.4);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* ADMIN - PRODUITS */
.section-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;}
.section-title{font-size:15px;font-weight:500;margin-bottom:14px;color:var(--dark);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-full{margin-bottom:10px;}
.form-full label,.form-row label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
.form-full input,.form-full textarea,.form-row input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);outline:none;}
.form-full input:focus,.form-row input:focus{border-color:var(--accent);}
.img-upload-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;}
.img-upload-area:hover{border-color:var(--accent);}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview{max-height:120px;max-width:100%;border-radius:8px;margin-top:10px;display:none;}
.btn-primary{padding:9px 20px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-primary:hover{background:var(--accent);}
.btn-danger{padding:6px 12px;background:none;border:1px solid #E24B4A;color:#E24B4A;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-danger:hover{background:#fef0f0;}
.prod-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.prod-row:last-child{border-bottom:none;}
.prod-thumb{width:44px;height:44px;border-radius:8px;background:#F0E8E0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}
.prod-row-info{flex:1;}
.prod-row-name{font-size:13px;font-weight:500;}
.prod-row-price{font-size:12px;color:var(--muted);}
.wa-input-row{display:flex;gap:10px;align-items:flex-end;}
.wa-input-row input{flex:1;}

/* COMMANDES */
.orders-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.stat-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;}
.stat-val{font-size:22px;font-weight:500;color:var(--dark);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.order-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.order-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.order-id{font-size:11px;color:var(--muted);}
.order-client{font-size:14px;font-weight:500;}
.order-product{font-size:13px;color:var(--muted);margin-bottom:8px;}
.order-bottom{display:flex;align-items:center;justify-content:space-between;}
.order-price{font-size:14px;font-weight:500;color:var(--accent);}
.status-select{padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;}
.status-select.pending{background:#FFF7ED;color:#C2410C;border-color:#FED7AA;}
.status-select.confirmed{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE;}
.status-select.shipped{background:#F0FDF4;color:#166534;border-color:#BBF7D0;}
.status-select.delivered{background:#F0FDF4;color:#166534;border-color:#BBF7D0;}
.status-select.cancelled{background:#FEF2F2;color:#991B1B;border-color:#FECACA;}
.order-date{font-size:11px;color:var(--muted);}
.order-note{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .icon{font-size:40px;margin-bottom:10px;}
.btn-notify{padding:5px 10px;background:var(--green-light);color:var(--green);border:1px solid #BBF7D0;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:6px;}
.btn-notify:hover{background:#D1FAE5;}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);}
.filter-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);}
</style>

<!-- MODAL COMMANDE -->
<div class="modal-overlay" id="order-modal">
  <div class="modal" style="position:relative;">
    <button class="btn-close" onclick="closeModal()">✕</button>
    <div id="modal-img-wrap"></div>
    <div class="modal-body">
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-prices">
        <span class="modal-price-old" id="modal-old"></span>
        <span class="modal-price-new" id="modal-new"></span>
        <span class="modal-badge" id="modal-badge"></span>
      </div>
      <div class="field-group">
        <label>Votre nom complet *</label>
        <input type="text" id="order-name" placeholder="Ex: Fatima Zahra">
      </div>
      <div class="field-group">
        <label>Ville / Adresse *</label>
        <input type="text" id="order-city" placeholder="Ex: Casablanca, Maarif">
      </div>
      <div class="field-group">
        <label>Numéro WhatsApp *</label>
        <input type="tel" id="order-phone" placeholder="+212 6XX XXX XXX">
      </div>
      <div class="field-group">
        <label>Note (taille, couleur, quantité...)</label>
        <textarea id="order-note" rows="2" placeholder="Précisions sur la commande"></textarea>
      </div>
      <button class="btn-wa" onclick="sendWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Commander via WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="nav">
  <div class="nav-logo" id="nav-logo">Ma Boutique</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('catalogue')">Boutique</button>
    <button class="nav-tab" onclick="showPanel('admin')">Gérer</button>
    <button class="nav-tab" onclick="showPanel('orders')">Commandes <span id="order-count-badge"></span></button>
  </div>
</div>

<!-- CATALOGUE -->
<div class="panel active" id="panel-catalogue">
  <div class="cat-header">
    <h2 id="cat-title">Ma Boutique</h2>
    <p id="cat-sub">France → Maroc · Livraison rapide</p>
  </div>
  <div class="product-grid" id="product-grid"></div>
</div>

<!-- ADMIN -->
<div class="panel" id="panel-admin">
  <div class="section-card">
    <div class="section-title">Paramètres boutique</div>
    <div class="form-full">
      <label>Nom de la boutique</label>
      <input type="text" id="conf-name" value="Ma Boutique" oninput="updateShopName(this.value)">
    </div>
    <div class="form-full">
      <label>Sous-titre</label>
      <input type="text" id="conf-sub" value="France → Maroc · Livraison rapide" oninput="document.getElementById('cat-sub').textContent=this.value">
    </div>
    <div class="form-full wa-input-row">
      <div style="flex:1">
        <label>Ton numéro WhatsApp (avec indicatif)</label>
        <input type="tel" id="conf-wa" value="+212600000000" placeholder="+212612345678">
      </div>
    </div>
    <button class="btn-primary" onclick="saveConf()" style="margin-top:6px;">Enregistrer</button>
  </div>

  <div class="section-card">
    <div class="section-title">Ajouter un produit</div>
    <div class="img-upload-area" id="upload-area">
      <input type="file" accept="image/*" id="img-input" onchange="previewImage(this)">
      <div id="upload-placeholder">
        <div style="font-size:28px;margin-bottom:6px;">📷</div>
        <div style="font-size:13px;color:var(--muted);">Clique pour ajouter une photo</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">JPG, PNG · max 5MB</div>
      </div>
      <img id="img-preview" class="img-preview">
    </div>
    <div class="form-full" style="margin-top:10px;">
      <label>Nom du produit *</label>
      <input type="text" id="prod-name" placeholder="Ex: Crème Clarins hydratante 50ml">
    </div>
    <div class="form-full">
      <label>Description courte</label>
      <textarea id="prod-desc" rows="2" placeholder="Origine, marque, état, caractéristiques..."></textarea>
    </div>
    <div class="form-row">
      <div>
        <label>Prix original (MAD)</label>
        <input type="number" id="prod-old" placeholder="450">
      </div>
      <div>
        <label>Prix promo (MAD) *</label>
        <input type="number" id="prod-new" placeholder="320">
      </div>
    </div>
    <button class="btn-primary" onclick="addProduct()">+ Ajouter au catalogue</button>
    <span id="add-msg" style="font-size:12px;color:var(--green);margin-left:10px;display:none;">Produit ajouté !</span>
  </div>

  <div class="section-card">
    <div class="section-title">Mes produits (<span id="prod-count">0</span>)</div>
    <div id="admin-prod-list"></div>
  </div>
</div>

<!-- COMMANDES -->
<div class="panel" id="panel-orders">
  <div class="orders-header">
    <h2 style="font-size:18px;">Commandes reçues</h2>
    <button class="btn-primary" style="font-size:12px;padding:6px 14px;" onclick="clearOrders()">Effacer tout</button>
  </div>
  <div class="stat-bar" id="stat-bar"></div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterOrders('all',this)">Toutes</button>
    <button class="filter-btn" onclick="filterOrders('pending',this)">En attente</button>
    <button class="filter-btn" onclick="filterOrders('confirmed',this)">Confirmées</button>
    <button class="filter-btn" onclick="filterOrders('shipped',this)">Expédiées</button>
    <button class="filter-btn" onclick="filterOrders('delivered',this)">Livrées</button>
  </div>
  <div id="orders-list"></div>
</div>

<script>
// STATE
let products = JSON.parse(localStorage.getItem('boutique_products') || '[]');
let orders = JSON.parse(localStorage.getItem('boutique_orders') || '[]');
let shopConfig = JSON.parse(localStorage.getItem('boutique_config') || '{"name":"Ma Boutique","sub":"France → Maroc · Livraison rapide","wa":"+212600000000"}');
let currentProduct = null;
let imgData = null;
let orderFilter = 'all';

// INIT
function init() {
  if(products.length === 0) {
    products = [
      {id:'p1',name:'Crème Clarins hydratante',desc:'Sérum visage 50ml, authentique, neuf',oldPrice:480,newPrice:320,img:null,emoji:'🧴'},
      {id:'p2',name:'Sac Coach cuir beige',desc:'Sac à main en cuir véritable, neuf avec étiquette',oldPrice:1200,newPrice:850,img:null,emoji:'👜'},
      {id:'p3',name:'Parfum Lancôme La Vie est Belle',desc:'EDP 75ml, version originale France',oldPrice:950,newPrice:680,img:null,emoji:'💄'},
    ];
    saveProducts();
  }
  document.getElementById('conf-name').value = shopConfig.name;
  document.getElementById('conf-sub').value = shopConfig.sub;
  document.getElementById('conf-wa').value = shopConfig.wa;
  document.getElementById('nav-logo').textContent = shopConfig.name;
  document.getElementById('cat-title').textContent = shopConfig.name;
  document.getElementById('cat-sub').textContent = shopConfig.sub;
  renderGrid(); renderAdminList(); renderOrders(); updateOrderBadge();
}

function saveProducts(){ localStorage.setItem('boutique_products', JSON.stringify(products)); }
function saveOrders(){ localStorage.setItem('boutique_orders', JSON.stringify(orders)); }
function saveConf(){
  shopConfig.name = document.getElementById('conf-name').value;
  shopConfig.sub = document.getElementById('conf-sub').value;
  shopConfig.wa = document.getElementById('conf-wa').value;
  localStorage.setItem('boutique_config', JSON.stringify(shopConfig));
  document.getElementById('nav-logo').textContent = shopConfig.name;
  document.getElementById('cat-title').textContent = shopConfig.name;
  document.getElementById('cat-sub').textContent = shopConfig.sub;
  alert('Paramètres sauvegardés !');
}
function updateShopName(v){ document.getElementById('nav-logo').textContent=v; document.getElementById('cat-title').textContent=v; }

// GRID
function renderGrid() {
  const g = document.getElementById('product-grid');
  if(products.length===0){g.innerHTML='<p style="color:var(--muted);font-size:13px;grid-column:1/-1;">Aucun produit. Ajoute-en dans "Gérer".</p>';return;}
  g.innerHTML = products.map(p => {
    const disc = p.oldPrice ? Math.round((1-p.newPrice/p.oldPrice)*100) : 0;
    const imgHtml = p.img ? `<img src="${p.img}" style="width:100%;height:160px;object-fit:cover;">` : `<div class="prod-img">${p.emoji||'🛍️'}</div>`;
    return `<div class="prod-card" onclick="openModal('${p.id}')">
      ${imgHtml}
      <div class="prod-info">
        ${disc>0?`<div class="badge-promo">-${disc}%</div>`:''}
        <div class="prod-name">${p.name}</div>
        <div class="prod-prices">
          ${p.oldPrice?`<span class="price-old">${p.oldPrice} MAD</span>`:''}
          <span class="price-new">${p.newPrice} MAD</span>
        </div>
        <button class="btn-order" onclick="event.stopPropagation();openModal('${p.id}')">Commander</button>
      </div>
    </div>`;
  }).join('');
}

// ADMIN LIST
function renderAdminList() {
  document.getElementById('prod-count').textContent = products.length;
  const l = document.getElementById('admin-prod-list');
  if(products.length===0){l.innerHTML='<p style="font-size:13px;color:var(--muted);">Aucun produit.</p>';return;}
  l.innerHTML = products.map(p => {
    const thumb = p.img ? `<img src="${p.img}" style="width:44px;height:44px;object-fit:cover;border-radius:8px;">` : `<div class="prod-thumb">${p.emoji||'🛍️'}</div>`;
    return `<div class="prod-row">
      <div class="prod-thumb">${p.img?`<img src="${p.img}" style="width:100%;height:100%;object-fit:cover;">`:p.emoji||'🛍️'}</div>
      <div class="prod-row-info">
        <div class="prod-row-name">${p.name}</div>
        <div class="prod-row-price">${p.oldPrice?`<s>${p.oldPrice}</s> → `:''}<strong>${p.newPrice} MAD</strong></div>
      </div>
      <button class="btn-danger" onclick="deleteProduct('${p.id}')">Suppr.</button>
    </div>`;
  }).join('');
}

// ADD PRODUCT
function previewImage(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgData = e.target.result;
    const prev = document.getElementById('img-preview');
    prev.src = imgData; prev.style.display='block';
    document.getElementById('upload-placeholder').style.display='none';
  };
  reader.readAsDataURL(file);
}

function addProduct() {
  const name = document.getElementById('prod-name').value.trim();
  const desc = document.getElementById('prod-desc').value.trim();
  const oldP = parseFloat(document.getElementById('prod-old').value)||0;
  const newP = parseFloat(document.getElementById('prod-new').value);
  if(!name||isNaN(newP)){alert('Le nom et le prix promo sont obligatoires.');return;}
  const p = {id:'p'+Date.now(),name,desc,oldPrice:oldP||null,newPrice:newP,img:imgData,emoji:'🛍️'};
  products.unshift(p); saveProducts();
  document.getElementById('prod-name').value='';
  document.getElementById('prod-desc').value='';
  document.getElementById('prod-old').value='';
  document.getElementById('prod-new').value='';
  document.getElementById('img-preview').style.display='none';
  document.getElementById('upload-placeholder').style.display='block';
  imgData=null;
  document.getElementById('img-input').value='';
  const msg=document.getElementById('add-msg'); msg.style.display='inline';
  setTimeout(()=>msg.style.display='none',2000);
  renderGrid(); renderAdminList();
}

function deleteProduct(id) {
  if(!confirm('Supprimer ce produit ?')) return;
  products = products.filter(p=>p.id!==id); saveProducts(); renderGrid(); renderAdminList();
}

// MODAL
function openModal(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return; currentProduct=p;
  const disc = p.oldPrice ? Math.round((1-p.newPrice/p.oldPrice)*100) : 0;
  const imgWrap = document.getElementById('modal-img-wrap');
  imgWrap.innerHTML = p.img ? `<img src="${p.img}" style="width:100%;height:220px;object-fit:cover;">` : `<div class="modal-img">${p.emoji||'🛍️'}</div>`;
  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-desc').textContent = p.desc||'';
  document.getElementById('modal-old').textContent = p.oldPrice ? p.oldPrice+' MAD' : '';
  document.getElementById('modal-new').textContent = p.newPrice+' MAD';
  document.getElementById('modal-badge').textContent = disc>0 ? '-'+disc+'%' : '';
  document.getElementById('modal-badge').style.display = disc>0?'inline':'none';
  document.getElementById('order-name').value='';
  document.getElementById('order-city').value='';
  document.getElementById('order-phone').value='';
  document.getElementById('order-note').value='';
  document.getElementById('order-modal').classList.add('open');
}
function closeModal(){ document.getElementById('order-modal').classList.remove('open'); }

// WHATSAPP + SAVE ORDER
function sendWhatsApp() {
  const name = document.getElementById('order-name').value.trim();
  const city = document.getElementById('order-city').value.trim();
  const phone = document.getElementById('order-phone').value.trim();
  const note = document.getElementById('order-note').value.trim();
  if(!name||!city||!phone){alert('Merci de remplir votre nom, ville et numéro WhatsApp.');return;}
  const p = currentProduct;
  const msg = `🛍️ *Nouvelle commande*\n\n*Produit:* ${p.name}\n*Prix:* ${p.newPrice} MAD${p.oldPrice?' (au lieu de '+p.oldPrice+' MAD)':''}\n\n*Client:* ${name}\n*Ville:* ${city}\n*Tél:* ${phone}${note?'\n*Note:* '+note:''}\n\n_Commande reçue via votre boutique_`;
  const wa = shopConfig.wa.replace(/\s/g,'').replace('+','');
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`,'_blank');
  const order = {
    id: 'CMD'+Date.now().toString().slice(-6),
    productId: p.id, productName: p.name,
    price: p.newPrice, client: name, city, phone,
    note: note||'', status: 'pending',
    date: new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  orders.unshift(order); saveOrders(); updateOrderBadge(); closeModal();
  alert('Commande envoyée sur WhatsApp et enregistrée !');
}

// ORDERS
function renderOrders() {
  const filtered = orderFilter==='all' ? orders : orders.filter(o=>o.status===orderFilter);
  const total = orders.length;
  const pending = orders.filter(o=>o.status==='pending').length;
  const delivered = orders.filter(o=>o.status==='delivered').length;
  const revenue = orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+o.price,0);
  document.getElementById('stat-bar').innerHTML=`
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Total commandes</div></div>
    <div class="stat"><div class="stat-val" style="color:#C2410C;">${pending}</div><div class="stat-label">En attente</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--green);">${revenue.toLocaleString()} MAD</div><div class="stat-label">Chiffre d'affaires</div></div>
  `;
  const l = document.getElementById('orders-list');
  if(filtered.length===0){
    l.innerHTML=`<div class="empty-state"><div class="icon">📦</div><p style="font-size:14px;">Aucune commande${orderFilter!=='all'?' dans cette catégorie':''}.</p></div>`;
    return;
  }
  const statusLabel={pending:'En attente',confirmed:'Confirmée',shipped:'Expédiée',delivered:'Livrée',cancelled:'Annulée'};
  l.innerHTML = filtered.map(o=>`
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-id">#${o.id} · ${o.date}</div>
          <div class="order-client">${o.client}</div>
          <div class="order-product" style="font-size:12px;margin-top:2px;">📍 ${o.city} · 📱 ${o.phone}</div>
        </div>
        <div style="text-align:right;">
          <div class="order-price">${o.price} MAD</div>
        </div>
      </div>
      <div class="order-product">🛍️ ${o.productName}</div>
      <div class="order-bottom">
        <select class="status-select ${o.status}" onchange="updateStatus('${o.id}',this)" >
          <option value="pending" ${o.status==='pending'?'selected':''}>⏳ En attente</option>
          <option value="confirmed" ${o.status==='confirmed'?'selected':''}>✅ Confirmée</option>
          <option value="shipped" ${o.status==='shipped'?'selected':''}>🚚 Expédiée</option>
          <option value="delivered" ${o.status==='delivered'?'selected':''}>🎉 Livrée</option>
          <option value="cancelled" ${o.status==='cancelled'?'selected':''}>❌ Annulée</option>
        </select>
        <button class="btn-notify" onclick="notifyClient('${o.id}')">📲 Notifier</button>
      </div>
      ${o.note?`<div class="order-note">💬 ${o.note}</div>`:''}
    </div>
  `).join('');
}

function updateStatus(id, sel) {
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = sel.value;
  sel.className = 'status-select '+sel.value;
  saveOrders(); updateOrderBadge(); renderOrders();
}

function notifyClient(id) {
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  const msgs = {
    pending:'Bonjour ! Nous avons bien reçu votre commande et allons vous confirmer très prochainement. Merci pour votre confiance !',
    confirmed:'Bonjour ! Votre commande a été confirmée. Nous préparons votre colis.',
    shipped:'Bonjour ! Votre colis a été expédié depuis la France. Vous le recevrez dans les prochains jours.',
    delivered:'Bonjour ! Nous espérons que vous avez bien reçu votre commande. Merci pour votre confiance et bonne utilisation !',
    cancelled:'Bonjour ! Votre commande a été annulée. N\'hésitez pas à nous recontacter.'
  };
  const msg = `Bonjour ${o.client} 👋\n\n_Commande #${o.id} — ${o.productName}_\n\n${msgs[o.status]||'Mise à jour de votre commande.'}`;
  const ph = o.phone.replace(/\s/g,'').replace('+','');
  window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`,'_blank');
}

function filterOrders(f, btn) {
  orderFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function updateOrderBadge() {
  const n = orders.filter(o=>o.status==='pending').length;
  document.getElementById('order-count-badge').textContent = n>0?' ('+n+')':'';
}

function clearOrders() {
  if(!confirm('Effacer toutes les commandes ?')) return;
  orders=[]; saveOrders(); renderOrders(); updateOrderBadge();
}

function showPanel(p) {
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('panel-'+p).classList.add('active');
  const tabs=['catalogue','admin','orders'];
  document.querySelectorAll('.nav-tab')[tabs.indexOf(p)].classList.add('active');
  if(p==='orders') renderOrders();
}

document.getElementById('order-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

init();
</script>
